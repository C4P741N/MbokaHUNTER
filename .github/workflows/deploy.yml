name: CI/CD Docker Deploy

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  # -------------------------------------------------
  # 1. Initialize shared variables
  # -------------------------------------------------
  init:
    name: Initialize Variables
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set-vars.outputs.image_name }}

    steps:
      - name: Set Variables
        id: set-vars
        run: |
          echo "image_name=kituku/tajiri-hub" >> $GITHUB_OUTPUT

  # -------------------------------------------------
  # 2. Determine semantic version & tag repo
  # -------------------------------------------------
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    needs: init
    outputs:
      image_tag: ${{ steps.version.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for tags

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -e
      
          git fetch --tags
      
          # Get latest tag starting with backend-
          LAST_TAG=$(git tag -l "backend-*" --sort=-v:refname | head -n 1)
      
          if [ -z "$LAST_TAG" ]; then
            VERSION="0.0.0"
          else
            # Remove ALL leading 'backend-' prefixes
            VERSION="${LAST_TAG##*backend-}"
            # In case there are extra dashes before numbers
            VERSION="${VERSION#-}"
          fi
      
          echo "Last tag: ${LAST_TAG:-backend-0.0.0}"
          echo "Parsed version: $VERSION"
      
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          COMMIT_MSG="$(git log -1 --pretty=%B)"
      
          if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$COMMIT_MSG" | grep -q "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
      
          NEW_TAG="backend-$MAJOR.$MINOR.$PATCH"
          echo "Calculated version: $NEW_TAG"
      
          git tag "$NEW_TAG" || echo "Tag $NEW_TAG already exists locally"
          git push origin "$NEW_TAG" || echo "Tag $NEW_TAG already exists on remote"
      
          echo "image_tag=$NEW_TAG" >> $GITHUB_OUTPUT


  # -------------------------------------------------
  # 3. Build & Push Docker Image
  # -------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [init, prepare]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          IMAGE="${{ needs.init.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  # -------------------------------------------------
  # 4. Deploy to server
  # -------------------------------------------------
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [init, prepare, build-and-push]

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          cd /home/${{ secrets.SERVER_USER }}/datadrive/tajiri-api
  
          DOCKER_IMAGE="${{ needs.init.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}"
          echo "Deploying new image: $DOCKER_IMAGE"
  
          # Update or add DOCKER_IMAGE in .env
          if grep -q "^DOCKER_IMAGE=" .env; then
            sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=$DOCKER_IMAGE|" .env
          else
            echo "DOCKER_IMAGE=$DOCKER_IMAGE" >> .env
          fi
  
          # Pull the new image
          docker pull "$DOCKER_IMAGE"
  
          # Recreate containers using updated .env
          docker compose -f docker-compose.be.prod.yml up -d --force-recreate
  
          # Optional cleanup
          docker image prune -a -f
